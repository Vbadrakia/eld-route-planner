databases:
  - name: eld-route-planner-db
    plan: free

services:
  - type: web
    name: eld-route-planner-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: eld-route-planner-db
          property: connectionString
      - key: ORS_API_KEY
        sync: false

